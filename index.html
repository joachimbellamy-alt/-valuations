<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Évaluation — Lecture expressive</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBoYst-1Hg1I5TBRZ9kn0emKQWltQHwfzo",
      authDomain: "evaluations-college.firebaseapp.com",
      projectId: "evaluations-college",
      storageBucket: "evaluations-college.firebasestorage.app",
      messagingSenderId: "507635245834",
      appId: "1:507635245834:web:a71876dca641b71e6390f3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ── Config des critères ──────────────────────────────────────────────────
    const config = {
      proc: {
        label: "Procédés d'écriture", niveaux: ["N1","N2","N3","N4"],
        descs: [
          "Les procédés d'écriture identifiés en groupe ne sont pas traduits par la voix : la mise en voix reste monocorde.",
          "Certains procédés d'écriture sont rendus audibles, mais de manière inégale ou incomplète.",
          "Les procédés rhétoriques (anaphores, contrastes, changements d'énonciation) sont rendus audibles et témoignent d'une cohérence avec le travail préparatoire.",
          "Les nuances et contrastes sont exploités avec aisance, révélant une intelligence collective et une compréhension profonde de la portée du discours."
        ]
      },
      volume: {
        label: "Volume", niveaux: ["N1","N2","N3","N4"],
        descs: [
          "Le volume, trop faible ou trop fort, entrave la clarté et la compréhension du propos.",
          "Le volume est linéaire, sans dynamique vocale suffisante pour marquer les intentions.",
          "La projection est adéquate : le volume est modulé en fonction du sens.",
          "Les variations de volume renforcent l'impact et témoignent d'une maîtrise de l'intensité."
        ]
      },
      debit: {
        label: "Débit", niveaux: ["N1","N2","N3","N4"],
        descs: [
          "Le débit, heurté ou précipité, rend le suivi du discours difficile.",
          "Le débit est uniforme, sans variations rythmiques pour mettre en valeur le texte.",
          "Le rythme est maîtrisé : le débit est posé, l'articulation précise et la vitesse intentionnelle.",
          "Le débit révèle une virtuosité rythmique : gestion très subtile de la vitesse pour souligner les moments forts du discours."
        ]
      },
      fluidite: {
        label: "Fluidité", niveaux: ["N1","N2","N3","N4"],
        descs: [
          "Les hésitations et ruptures fréquentes entravent la continuité expressive.",
          "La fluidité est présente mais des hésitations persistent et nuisent à l'écoute.",
          "La lecture est fluide et soutient l'écoute.",
          "La voix est fluide et s'adapte avec souplesse aux inflexions du texte."
        ]
      },
      ponctuation: {
        label: "Ponctuation", niveaux: ["N1","N2","N3","N4"],
        descs: [
          "La ponctuation est ignorée : on note une absence de structuration vocale et de respirations.",
          "La ponctuation est parfois respectée, mais des hésitations ou erreurs subsistent.",
          "Les pauses respiratoires et les silences respectent bien le sens du discours.",
          "Les silences et les pauses sont très bien maîtrisés, suspendant l'attention et renforçant le sens."
        ]
      }
    };

    const competenceOptions = [
      { val: 'insuf',   label: 'Insuffisant',        cls: 'selected-insuf' },
      { val: 'fragile', label: 'Fragile',             cls: 'selected-fragile' },
      { val: 'satisf',  label: 'Satisfaisant',        cls: 'selected-satisf' },
      { val: 'tres',    label: 'Très bonne maîtrise', cls: 'selected-tres' }
    ];

    // ── État local ───────────────────────────────────────────────────────────
    const eleveData = {};
    let saveTimers = {};

    function buildSynthese(id) {
      return Object.keys(config).map(k => eleveData[id][k].texte).join(" ");
    }
    function getSynthese(id) {
      const el = document.getElementById('synthese-' + id);
      return el ? el.value : buildSynthese(id);
    }

    // ── Sauvegarde Firebase (avec délai anti-spam) ───────────────────────────
    function sauvegarder(id) {
      clearTimeout(saveTimers[id]);
      saveTimers[id] = setTimeout(async () => {
        const d = eleveData[id];
        const criteres = {};
        for (const k in config) criteres[k] = { val: d[k].val, texte: d[k].texte };
        await setDoc(doc(db, "eleves", String(id)), {
          id,
          nom: d.nom || '',
          note: d.note,
          competence: d.competence || null,
          synthese: getSynthese(id),
          criteres,
          updatedAt: new Date().toISOString()
        });
        afficherStatut(id, '✓ Sauvegardé');
      }, 800);
    }

    async function supprimerEleve(id) {
      if (!confirm('Supprimer cet élève ?')) return;
      await deleteDoc(doc(db, "eleves", String(id)));
      const el = document.getElementById('eleve-' + id);
      if (el) el.remove();
      delete eleveData[id];
    }

    function afficherStatut(id, msg) {
      const el = document.getElementById('statut-' + id);
      if (!el) return;
      el.textContent = msg;
      setTimeout(() => { el.textContent = ''; }, 2500);
    }

    // ── Rendu d'une carte élève ──────────────────────────────────────────────
    function rendreCarteEleve(data) {
      const id = data.id;
      eleveData[id] = { nom: data.nom, note: data.note ?? 5, competence: data.competence ?? null };
      for (const k in config) {
        eleveData[id][k] = {
          val: data.criteres?.[k]?.val ?? 0,
          texte: data.criteres?.[k]?.texte ?? config[k].descs[0]
        };
      }

      if (document.getElementById('eleve-' + id)) {
        // Mise à jour silencieuse si la carte existe déjà
        document.getElementById('nom-' + id).value = data.nom || '';
        document.getElementById('note-display-' + id).innerHTML = (data.note ?? 5) + ' <span>/ 10</span>';
        document.querySelector(`#eleve-${id} input[type=range].note-slider`).value = data.note ?? 5;
        for (const k in config) {
          const v = data.criteres?.[k]?.val ?? 0;
          document.getElementById('badge-' + id + '-' + k).textContent = config[k].niveaux[v];
          document.querySelector(`#eleve-${id} [data-key="${k}"]`).value = v;
        }
        const synthEl = document.getElementById('synthese-' + id);
        if (synthEl && document.activeElement !== synthEl) synthEl.value = data.synthese || buildSynthese(id);
        majAffichageCompetence(id, data.competence);
        return;
      }

      // Création de la carte
      const div = document.createElement('div');
      div.className = 'eleve-card';
      div.id = 'eleve-' + id;

      let critHTML = '';
      for (const [key, cfg] of Object.entries(config)) {
        const v = eleveData[id][key].val;
        critHTML += `
          <div class="critere-row">
            <div class="section-label">${cfg.label}</div>
            <div class="critere-controls">
              <input type="range" min="0" max="3" value="${v}" step="1" data-key="${key}"
                oninput="window.majNiveau(${id},'${key}',this.value)"
                onchange="window.majNiveau(${id},'${key}',this.value)">
              <span class="niveau-badge" id="badge-${id}-${key}">${cfg.niveaux[v]}</span>
            </div>
          </div>`;
      }

      const compHTML = competenceOptions.map(o =>
        `<label class="competence-option" id="comp-lbl-${id}-${o.val}" onclick="window.majCompetence(${id},'${o.val}')">
          <input type="radio" name="comp-${id}" value="${o.val}">${o.label}
        </label>`
      ).join('');

      const synthese = data.synthese || buildSynthese(id);

      div.innerHTML = `
        <div class="eleve-header">
          <div class="eleve-num">${id}</div>
          <input type="text" placeholder="Nom de l'élève" id="nom-${id}" value="${data.nom || ''}"
            oninput="window.majNom(${id},this.value)">
          <span class="statut" id="statut-${id}"></span>
          <button class="btn-remove" onclick="window.supprimerEleve(${id})">✕ Supprimer</button>
        </div>
        ${critHTML}
        <div class="section-label">Note</div>
        <div class="note-row">
          <input type="range" class="note-slider" min="0" max="10" value="${data.note ?? 5}" step="0.5"
            oninput="window.majNote(${id},this.value)"
            onchange="window.majNote(${id},this.value)">
          <div class="note-display" id="note-display-${id}">${data.note ?? 5} <span>/ 10</span></div>
        </div>
        <div class="section-label">Exploiter les ressources expressives et créatives de la parole</div>
        <div class="competence-row" id="comp-row-${id}">${compHTML}</div>
        <div class="section-label">Appréciation globale</div>
        <textarea class="synthese-box" id="synthese-${id}"
          oninput="window.majSynthese(${id})">${synthese}</textarea>
        <div class="synthese-hint">Modifiable librement — déplacer un curseur réinitialise le texte.</div>
        <button class="btn-pdf" onclick="window.genererPDF(${id})">⬇ Générer le PDF</button>`;

      document.getElementById('eleves-container').appendChild(div);
      majAffichageCompetence(id, data.competence);
    }

    function majAffichageCompetence(id, val) {
      competenceOptions.forEach(o => {
        const lbl = document.getElementById('comp-lbl-' + id + '-' + o.val);
        if (lbl) lbl.className = 'competence-option' + (val === o.val ? ' ' + o.cls : '');
      });
    }

    // ── Fonctions globales (appelées depuis le HTML inline) ──────────────────
    window.majNom = (id, val) => {
      eleveData[id].nom = val;
      sauvegarder(id);
    };
    window.majNote = (id, val) => {
      val = parseFloat(val);
      eleveData[id].note = val;
      document.getElementById('note-display-' + id).innerHTML = val + ' <span>/ 10</span>';
      sauvegarder(id);
    };
    window.majCompetence = (id, val) => {
      eleveData[id].competence = val;
      majAffichageCompetence(id, val);
      sauvegarder(id);
    };
    window.majNiveau = (id, key, val) => {
      val = parseInt(val);
      eleveData[id][key].val = val;
      document.getElementById('badge-' + id + '-' + key).textContent = config[key].niveaux[val];
      eleveData[id][key].texte = config[key].descs[val];
      document.getElementById('synthese-' + id).value = buildSynthese(id);
      sauvegarder(id);
    };
    window.majSynthese = (id) => {
      sauvegarder(id);
    };
    window.supprimerEleve = supprimerEleve;

    window.ajouterEleve = async () => {
      const id = Date.now(); // ID unique basé sur l'horodatage
      const defaultData = { id, nom: '', note: 5, competence: null, synthese: '', criteres: {}, updatedAt: new Date().toISOString() };
      for (const k in config) defaultData.criteres[k] = { val: 0, texte: config[k].descs[0] };
      defaultData.synthese = Object.values(defaultData.criteres).map(c => c.texte).join(" ");
      await setDoc(doc(db, "eleves", String(id)), defaultData);
      // Le listener onSnapshot va déclencher le rendu automatiquement
    };

    window.genererPDF = (id) => {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const d = eleveData[id];
      const nom = (d.nom || '').trim() || 'Élève';
      const note = d.note;
      const comp = d.competence;
      const compLabel = comp ? competenceOptions.find(o => o.val === comp).label : '—';

      doc.setFontSize(16); doc.setFont(undefined, 'bold');
      doc.text('Évaluation — Lecture expressive', 10, 15);
      doc.setFontSize(13); doc.setFont(undefined, 'normal');
      doc.text('Élève : ' + nom, 10, 24);
      doc.setFont(undefined, 'bold');
      doc.text('Note : ' + note + ' / 10', 150, 24);
      doc.setLineWidth(0.3); doc.line(10, 28, 200, 28);

      let y = 38;
      for (const [key, cfg] of Object.entries(config)) {
        const niveau = cfg.niveaux[d[key].val];
        doc.setFontSize(9); doc.setFont(undefined, 'bold');
        doc.text(cfg.label.toUpperCase() + '  [' + niveau + ']', 10, y);
        y += 4;
      }

      y += 6;
      doc.setFont(undefined, 'bold'); doc.setFontSize(10);
      doc.text('Exploiter les ressources expressives et créatives de la parole :', 10, y);
      doc.setFont(undefined, 'normal');
      doc.text(compLabel, 10, y + 6);

      y += 16;
      doc.setFont(undefined, 'bold'); doc.setFontSize(11);
      doc.text('Appréciation globale', 10, y);
      y += 7;
      doc.setFont(undefined, 'italic'); doc.setFontSize(10);
      const lines = doc.splitTextToSize(getSynthese(id), 180);
      doc.text(lines, 12, y);

      doc.save(nom + '_evaluation.pdf');
    };

    window.exporterTous = () => {
      for (const id in eleveData) window.genererPDF(parseInt(id));
    };

    // ── Écoute temps réel Firestore ──────────────────────────────────────────
    onSnapshot(collection(db, "eleves"), (snapshot) => {
      snapshot.docChanges().forEach(change => {
        const data = change.doc.data();
        if (change.type === "added" || change.type === "modified") {
          rendreCarteEleve(data);
        }
        if (change.type === "removed") {
          const el = document.getElementById('eleve-' + data.id);
          if (el) el.remove();
          delete eleveData[data.id];
        }
      });
    });

  </script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; padding: 20px; max-width: 820px; margin: auto; background: #f5f5f5; color: #222; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 1.5rem; }
    .eleve-card { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem; }
    .eleve-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; }
    .eleve-num { width: 30px; height: 30px; border-radius: 50%; background: #dbeafe; color: #1d4ed8; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
    .eleve-header input[type=text] { flex: 1; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; min-width: 150px; }
    .statut { font-size: 12px; color: #16a34a; font-weight: 500; }
    .btn-remove { padding: 6px 12px; border: 1px solid #ccc; border-radius: 6px; background: transparent; color: #888; cursor: pointer; font-size: 13px; }
    .btn-remove:hover { color: #c00; border-color: #c00; }
    .critere-row { margin-bottom: 0.85rem; }
    .section-label { font-size: 12px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; margin-top: 1rem; }
    .critere-controls { display: flex; align-items: center; gap: 10px; }
    .critere-controls input[type=range] { flex: 1; }
    .niveau-badge { font-size: 12px; color: #1d4ed8; background: #dbeafe; border-radius: 6px; padding: 2px 10px; min-width: 36px; text-align: center; font-weight: 600; }
    .note-row { display: flex; align-items: center; gap: 12px; margin-top: 0.25rem; }
    .note-row input[type=range] { flex: 1; }
    .note-display { font-size: 22px; font-weight: 600; min-width: 60px; text-align: center; }
    .note-display span { font-size: 13px; font-weight: 400; color: #888; }
    .competence-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 0.25rem; }
    .competence-option { display: flex; align-items: center; gap: 6px; cursor: pointer; padding: 6px 14px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; color: #555; background: transparent; user-select: none; }
    .competence-option input[type=radio] { display: none; }
    .competence-option.selected-insuf   { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; font-weight: 600; }
    .competence-option.selected-fragile { background: #fef3c7; color: #92400e; border-color: #fcd34d; font-weight: 600; }
    .competence-option.selected-satisf  { background: #dbeafe; color: #1d4ed8; border-color: #93c5fd; font-weight: 600; }
    .competence-option.selected-tres    { background: #d1fae5; color: #065f46; border-color: #6ee7b7; font-weight: 600; }
    .synthese-box { width: 100%; margin-top: 0.25rem; padding: 1rem; background: #fafafa; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; color: #444; line-height: 1.7; font-style: italic; min-height: 90px; resize: vertical; font-family: sans-serif; }
    .synthese-hint { font-size: 11px; color: #aaa; margin-top: 3px; }
    .btn-pdf { padding: 10px 16px; border: 1px solid #ccc; border-radius: 6px; background: transparent; color: #333; cursor: pointer; font-size: 14px; margin-top: 1rem; }
    .btn-pdf:hover { background: #f0f0f0; }
    .btn-add { width: 100%; padding: 12px; border: 1px dashed #aaa; border-radius: 10px; background: transparent; color: #666; cursor: pointer; font-size: 14px; margin-top: 0.5rem; }
    .btn-add:hover { background: #f0f0f0; }
    .btn-all { width: 100%; padding: 14px; background: #2c3e50; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 15px; margin-top: 1rem; }
    .btn-all:hover { background: #1a252f; }
  </style>
</head>
<body>
  <h1>Évaluation — Lecture expressive</h1>
  <div id="eleves-container"></div>
  <button class="btn-add" onclick="ajouterEleve()">+ Ajouter un élève</button>
  <button class="btn-all" onclick="exporterTous()">⬇ Exporter tous les PDF</button>
</body>
</html>
