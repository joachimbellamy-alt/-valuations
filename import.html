    };

    async function importer() {
      for (const [ordre, d] of Object.entries(eleves)) {
        const id = Date.now() + parseInt(ordre) * 10;
        const synthese = ['proc','volume','debit','fluidite','ponctuation']
          .map(k => d[k].texte).join(" ");
        const criteres = {};
        for (const k of ['proc','volume','debit','fluidite','ponctuation']) {
          criteres[k] = { val: d[k].val, texte: d[k].texte };
        }
        await setDoc(doc(db, "eleves", String(id)), {
          id,
          ordre: parseInt(ordre),
          nom: d.nom,
          note: d.note,
          competence: d.competence,
          synthese,
          criteres,
          updatedAt: new Date().toISOString()
        });
        log.innerHTML += `✓ ${d.nom} importé<br>`;
      }
      log.innerHTML += '<br><strong>✅ Import terminé ! Vous pouvez fermer cette page.</strong>';
    }

    importer();
